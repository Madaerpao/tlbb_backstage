<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>潜能分配 - TLBB 管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="title">潜能分配</h1>
        <p class="subtitle">在线为您角色的未分配潜能点进行充值（需离线状态）</p>
        
        <form action="/potential_result" method="post">
            <div class="form-group">
                <label for="usr">账号</label>
                <input type="text" id="usr" name="usr" class="form-control" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">登录密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="re_password">确认登录密码</label>
                <input type="password" id="re_password" name="re_password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="points">分配潜能点数</label>
                <input type="number" id="points" name="points" class="form-control" required min="1" max="1000000" placeholder="例如: 1000">
            </div>
            
            <div class="form-group">
                <label>安全验证码</label>
                <div class="captcha-group">
                    <input type="text" name="usr_input" class="form-control" placeholder="输入右侧验证码" required autocomplete="off">
                    <div class="captcha-img">{{ get_code }}</div>
                </div>
            </div>
            
            <button type="submit" class="btn">确认分配</button>
            <a href="/" class="btn btn-secondary">返回首页</a>
        </form>
        
        <div class="footer">
            <p>&copy; 2026 TLBB Backstage. <a href="{{ my_website }}" target="_blank">访问主页</a></p>
        </div>
    </div>
</body>
</html>
