<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 - TLBB 管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="title">账号注册</h1>
        <p class="subtitle">欢迎来到天龙八部，请填写以下信息完成注册</p>
        
        <form action="/register_result" method="post">
            <div class="form-group">
                <label for="usr">账号 (建议由纯数字或字母组成)</label>
                <input type="text" id="usr" name="usr" class="form-control" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="re_password">确认密码</label>
                <input type="password" id="re_password" name="re_password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="superpwd">超级密码 (用于找回和修改密码，至少8位)</label>
                <input type="password" id="superpwd" name="superpwd" class="form-control" required minlength="8">
            </div>
            
            <div class="form-group">
                <label>安全验证码</label>
                <div class="captcha-group">
                    <input type="text" name="usr_input" class="form-control" placeholder="输入右侧验证码" required autocomplete="off">
                    <div class="captcha-img">{{ get_code }}</div>
                </div>
            </div>
            
            <button type="submit" class="btn">立即注册</button>
            <a href="/" class="btn btn-secondary">返回首页</a>
        </form>
        
        <div class="footer">
            <p>&copy; 2026 TLBB Backstage. <a href="{{ my_website }}" target="_blank">访问主页</a></p>
        </div>
    </div>
</body>
</html>
