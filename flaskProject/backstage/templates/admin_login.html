<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM 后台登录 - TLBB 管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="title">GM 运维后台登录</h1>
        <p class="subtitle">此系统仅供服务器管理人员使用</p>
        
        <form action="/admin_login" method="post">
            <div class="form-group">
                <label for="password">管理员密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>安全验证码</label>
                <div class="captcha-group">
                    <input type="text" name="usr_input" class="form-control" placeholder="输入右侧验证码" required autocomplete="off">
                    <div class="captcha-img">{{ get_code }}</div>
                </div>
            </div>
            
            <button type="submit" class="btn">安全登录</button>
            <a href="/" class="btn btn-secondary">返回玩家首页</a>
        </form>
        
        <div class="footer">
            <p>&copy; 2026 TLBB Backstage. <a href="{{ my_website }}" target="_blank">访问主页</a></p>
        </div>
    </div>
</body>
</html>
