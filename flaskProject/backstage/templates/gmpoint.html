<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM 充值通道 - TLBB 管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="title">GM 点数发放通道</h1>
        <p class="subtitle">此功能仅供管理员使用</p>
        
        <form action="/gmpoint_result" method="post">
            <div class="form-group">
                <label for="usr">目标账号 (充值给谁)</label>
                <input type="text" id="usr" name="usr" class="form-control" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="gmpoints">充值点数 (整数)</label>
                <input type="number" id="gmpoints" name="gmpoints" class="form-control" required min="1">
            </div>
            
            <div class="form-group">
                <label>安全验证码</label>
                <div class="captcha-group">
                    <input type="text" name="usr_input" class="form-control" placeholder="输入右侧验证码" required autocomplete="off">
                    <div class="captcha-img">{{ get_code }}</div>
                </div>
            </div>
            
            <button type="submit" class="btn">确认发放</button>
            <a href="/admin_dashboard" class="btn btn-secondary">返回 GM 控制台</a>
        </form>
        
        <div class="footer">
            <p>&copy; 2026 TLBB Backstage. <a href="{{ my_website }}" target="_blank">访问主页</a></p>
        </div>
    </div>
</body>
</html>
