<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - TLBB 管理后台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="title">修改密码</h1>
        <p class="subtitle">请提供您的超级密码以验证身份</p>
        
        <form action="/mpwd_result" method="post">
            <div class="form-group">
                <label for="usr">账号</label>
                <input type="text" id="usr" name="usr" class="form-control" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="superpwd">超级密码 (注册时填写的)</label>
                <input type="password" id="superpwd" name="superpwd" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password">新密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="re_password">确认新密码</label>
                <input type="password" id="re_password" name="re_password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label>安全验证码</label>
                <div class="captcha-group">
                    <input type="text" name="usr_input" class="form-control" placeholder="输入右侧验证码" required autocomplete="off">
                    <div class="captcha-img">{{ get_code }}</div>
                </div>
            </div>
            
            <button type="submit" class="btn">确认修改</button>
            <a href="/" class="btn btn-secondary">返回首页</a>
        </form>
        
        <div class="footer">
            <p>&copy; 2026 TLBB Backstage. <a href="{{ my_website }}" target="_blank">访问主页</a></p>
        </div>
    </div>
</body>
</html>
